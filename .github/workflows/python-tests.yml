name: CI — Tests and optional redeploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      redeploy_webhook:
        description: 'Optional: redeploy webhook URL (not stored as secret)'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

  redeploy:
    needs: test
    if: ${{ secrets.STREAMLIT_REDEPLOY_WEBHOOK != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger redeploy webhook
        run: |
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref }}","sha":"${{ github.sha }}"}' \
            "${{ secrets.STREAMLIT_REDEPLOY_WEBHOOK }}"
